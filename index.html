<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lightning Pay - Generador de Enlaces</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>⚡ Lightning Pay</h1>
        <p>Genera enlaces de pago en sats desde euros</p>
    </header>
    <main>
        <div class="converter">
            <label for="euro">Cantidad en €:</label>
            <input type="number" id="euro" value="50" step="0.01">
            <button onclick="generateLink()">Generar Enlace de Pago</button>
        </div>
        <div id="result" class="result"></div>
    </main>
    <footer>
        <p>Demo - Usa con wallets Lightning</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
